basePath: /
definitions:
  handler.DomainRequest:
    properties:
      domain:
        example: paper.id
        type: string
    type: object
  handler.LocationRequest:
    properties:
      query:
        example: Paper.id Jakarta
        type: string
    type: object
  handler.WebsiteRequest:
    properties:
      url:
        example: https://paper.id
        type: string
    type: object
  response.APIResponse:
    properties:
      data: {}
      error:
        type: string
      success:
        type: boolean
    type: object
  service.CompanyData:
    properties:
      domain:
        $ref: '#/definitions/service.DomainData'
      location:
        $ref: '#/definitions/service.LocationData'
      website:
        $ref: '#/definitions/service.WebsiteData'
    type: object
  service.DomainData:
    properties:
      domain:
        type: string
      expired_at:
        type: string
      last_updated:
        type: string
      nameservers:
        items:
          type: string
        type: array
      registered_at:
        type: string
      registrar:
        type: string
      status:
        items:
          type: string
        type: array
    type: object
  service.LocationData:
    properties:
      address:
        additionalProperties: true
        type: object
      display_name:
        type: string
      importance:
        type: number
      latitude:
        type: string
      longitude:
        type: string
      osm_type:
        type: string
    type: object
  service.WebsiteData:
    properties:
      canonical:
        type: string
      description:
        type: string
      emails:
        items:
          type: string
        type: array
      favicon:
        type: string
      open_graph:
        additionalProperties:
          type: string
        type: object
      phones:
        items:
          type: string
        type: array
      social_media:
        items:
          type: string
        type: array
      title:
        type: string
      url:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API untuk ekstraksi metadata website, domain intelligence, dan lokasi
    geografis.
  title: Data Acquisition Engine API
  version: "1.0"
paths:
  /company-information:
    get:
      consumes:
      - application/json
      description: Menggabungkan data website, domain, dan lokasi secara paralel berdasarkan
        domain perusahaan. Mendukung fallback lokasi jika title website tidak menghasilkan
        hasil.
      parameters:
      - description: 'Domain perusahaan (contoh: paper.id)'
        in: query
        name: domain
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/service.CompanyData'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      summary: Get unified company information
      tags:
      - Company
  /extract/domain:
    post:
      consumes:
      - application/json
      description: Mengambil informasi domain melalui protokol RDAP, termasuk registrar,
        tanggal registrasi, kedaluwarsa, status, dan nameserver.
      parameters:
      - description: Domain yang akan diekstrak
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.DomainRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/service.DomainData'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      summary: Extract domain intelligence
      tags:
      - Domain
  /extract/location:
    post:
      consumes:
      - application/json
      description: Mencari informasi lokasi geografis berdasarkan query teks menggunakan
        OpenStreetMap Nominatim.
      parameters:
      - description: Query pencarian lokasi
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.LocationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/service.LocationData'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      summary: Find location by query
      tags:
      - Location
  /extract/website:
    post:
      consumes:
      - application/json
      description: Mengekstrak metadata dari URL website, termasuk title, deskripsi,
        Open Graph, email, telepon, dan media sosial.
      parameters:
      - description: URL website yang akan diekstrak
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.WebsiteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/service.WebsiteData'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      summary: Extract website metadata
      tags:
      - Website
swagger: "2.0"
